<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cardápio - GameBeer</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0b0b0b;
      color:white;
    }

    header{
      background:#050505;
      padding:25px;
      text-align:center;
      border-bottom:2px solid #00ffee;
    }

    header h1{
      color:#00ffee;
      font-size:45px;
    }

    .container{
      padding:60px 10%;
    }

    .titulo{
      color:#00ffee;
      font-size:35px;
      margin-bottom:30px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
      margin-bottom:60px;
    }

    .card{
      background:#151515;
      padding:25px;
      border-radius:15px;
      border:1px solid #00ffee33;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 0 20px #00ffee44;
    }

    .card h3{
      color:#00ffee;
      margin-bottom:15px;
      font-size:25px;
    }

    .card p{
      color:#cfcfcf;
      margin-bottom:10px;
      line-height:1.5;
    }

    .preco{
      font-size:22px;
      font-weight:bold;
      color:#00ffee;
    }

    footer{
      background:#050505;
      text-align:center;
      padding:20px;
      color:#888;
      border-top:1px solid #00ffee22;
    }

  </style>
</head>
