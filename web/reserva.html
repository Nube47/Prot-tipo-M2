..<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reserva - GameBeer</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif; 
    }

    body{
      background:#0a0a0a;
      color:white;
    }

    header{
      background:#050505;
      padding:25px;
      text-align:center;
      border-bottom:2px solid #00ffee;
    }

    header h1{
      color:#00ffee;
      font-size:45px;
    }

    .container{
      min-height:80vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .formulario{
      width:100%;
      max-width:600px;
      background:#151515;
      padding:40px;
      border-radius:20px;
      border:1px solid #00ffee33;
    }

    .formulario h2{
      text-align:center;
      margin-bottom:30px;
      color:#00ffee;
      font-size:35px;
    }

    .campo{
      margin-bottom:20px;
    }

    .campo label{
      display:block;
      margin-bottom:8px;
      color:#cfcfcf;
    }

    .campo input,
    .campo textarea{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#0d0d0d;
      color:white;
      outline:none;
      border:1px solid #333;
    }

    .campo textarea{
      resize:none;
      height:150px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#00ffee;
      color:black;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#00cdb6;
      transform:scale(1.02);
    }

    footer{
      background:#050505;
      text-align:center;
      padding:20px;
      color:#888;
      border-top:1px solid #00ffee22;
    }

  </style>
</head>
<body>

  <header>
    <h1>📞 Contato</h1>
  </header>

  <div class="container">

    <div class="formulario">

      <h2>Fale com o GameBeer</h2>

      <form>

        <div class="campo">
          <label>Nome</label>
          <input type="text" placeholder="Digite seu nome">
        </div>

        <div class="campo">
          <label>Email</label>
          <input type="email" placeholder="Digite seu email">
        </div>

        <div class="campo">
          <label>Mensagem</label>
          <textarea placeholder="Digite sua mensagem"></textarea>
        </div>

        <a href="index..html"> 
          <button type="submit">Enviar</button>
        </a>
        <p style="text-align: center; 
        color:#00ffee;
        text-decoration:none;
        transition:0.3s;
       " > Ao clicar em enviar você retornará para a página inicial</p>


      </form>

    </div>

  </div>

  <footer>
    © 2026 GameBeer
  </footer>

</body>
</html>
