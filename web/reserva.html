<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="reserva.css">
  <title>Reserva - GameBeer</title>

</head>
<body>

  <header>
    <h1>📞 Contato</h1>
  </header>

  <div class="container">

    <div class="formulario">

      <h2>Fale com o GameBeer</h2>

      <form>

        <div class="campo">
          <label>Nome
          <input type="text" placeholder="Digite seu nome">
          </label>
        </div>

        <div class="campo">
          <label>Email
          <input type="email" placeholder="Digite seu email">
          </label>
        </div>

        <div class="campo">
          <label>Mensagem
          <textarea placeholder="Digite sua mensagem"></textarea>
          </label>
        </div>

        <a href="index.html">
          <button type="button">Enviar</button>
        </a>
        <p style="text-align: center; 
        color:#00ffee;
        text-decoration:none;
        transition:0.3s;
       " > Ao clicar em enviar você retornará para a página inicial</p>


      </form>

    </div>

  </div>

  <footer>
    © 2026 GameBeer
  </footer>

</body>
</html>
