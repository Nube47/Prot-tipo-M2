<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Games - GameBeer</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0b0b0b;
      color:white;
    }

    header{
      background:#050505;
      padding:25px;
      text-align:center;
      border-bottom:2px solid #00ffee;
    }

    header h1{
      color:#00ffee;
      font-size:45px;
    }

    .container{
      padding:60px 10%;
    }

    .titulo{
      text-align:center;
      color:#00ffee;
      font-size:35px;
      margin-bottom:50px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:25px;
    }

    .card{
      background:#151515;
      border-radius:15px;
      overflow:hidden;
      border:1px solid #00ffee33;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 0 20px #00ffee44;
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .card-content{
      padding:25px;
    }

    .card h3{
      color:#00ffee;
      margin-bottom:15px;
      font-size:28px;
    }

    .card p{
      color:#d4d4d4;
      line-height:1.6;
    }

    footer{
      background:#050505;
      text-align:center;
      padding:20px;
      color:#888;
      border-top:1px solid #00ffee22;
      margin-top:60px;
    }

  </style>
</head>
<body>

  <header>
    <h1>🎮 Área Games</h1>
  </header>

  <div class="container">

    <h2 class="titulo">Jogos Disponíveis</h2>

    <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h3>FIFA</h3>

          <p>
            Partidas multiplayer e campeonatos
            valendo prêmios e consumação.
          </p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1511882150382-421056c89033?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h3>NBA 2K</h3>

          <p>
            Quadras virtuais liberadas para desafios,
            torneios e partidas entre amigos.
          </p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1560253023-3ec5d502959f?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h3>Valorant</h3>

          <p>
            PCs gamers de alto desempenho para
            partidas competitivas online.
          </p>
        </div>
      </div>

    </div>

  </div>

  <footer>
    © 2026 GameBeer
  </footer>

</body>
</html>
